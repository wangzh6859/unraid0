name: Generate Signing Keystore (只需运行一次)

# 手动触发：在仓库的 Actions 标签页里选择这个 workflow，点击 "Run workflow"。
# 运行完成后，到本次运行的页面下方 "Artifacts" 里下载 unraid-mobile-keystore 压缩包，
# 里面包含 release.jks（签名证书本体）和 keystore-info.txt（证书密码等信息）。
#
# 下载后，按 keystore-info.txt 里的说明，把 4 个值分别添加到
# 仓库 Settings → Secrets and variables → Actions 里，作为 4 个 Repository secret：
#   KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
#
# 之后请把下载到本地的 release.jks 妥善保管备份（比如存到网盘），
# 这是你这个 App 能够持续原地升级安装的唯一凭证，遗失后无法恢复，
# 只能给所有已安装用户发布一个"全新应用"，老用户需要先卸载旧版才能装新版。

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 安装 JDK（附带 keytool 工具）
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 生成随机密码并创建签名证书
        run: |
          PASSWORD=$(openssl rand -base64 18 | tr -d '/+=' | cut -c1-20)
          keytool -genkeypair -v \
            -keystore release.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias unraidmobile \
            -storepass "$PASSWORD" \
            -keypass "$PASSWORD" \
            -dname "CN=Unraid Mobile, OU=Home, O=Personal, L=City, S=State, C=CN"

          base64 -w 0 release.jks > release_base64.txt

          cat > keystore-info.txt <<EOF
          ============================================================
          Unraid Mobile 签名证书信息 —— 请妥善保管，不要泄露给他人
          ============================================================

          把下面 4 项分别添加为仓库 Secret
          (Settings -> Secrets and variables -> Actions -> New repository secret):

          KEYSTORE_BASE64  = <打开同目录下的 release_base64.txt，把里面那一整行内容复制进去>
          KEYSTORE_PASSWORD = $PASSWORD
          KEY_ALIAS         = unraidmobile
          KEY_PASSWORD       = $PASSWORD

          添加完这 4 个 Secret 后，以后每次 push 代码到 main 分支，
          build-apk.yml 都会自动用这份证书签名，实现手机原地升级安装。

          请把本文件夹里的 release.jks 额外备份一份到网盘或本地电脑，
          这是唯一的签名凭证，遗失后无法找回。
          ============================================================
          EOF

      - name: 上传证书（在本次 workflow 运行页面的 Artifacts 里下载）
        uses: actions/upload-artifact@v4
        with:
          name: unraid-mobile-keystore
          path: |
            release.jks
            release_base64.txt
            keystore-info.txt
          retention-days: 90
